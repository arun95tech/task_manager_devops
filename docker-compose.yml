version: "3.9"

services:
  user_service:
    build:
      context: .
      dockerfile: docker/user_service.Dockerfile
    container_name: user_service_container
    ports:
      - "8000:8000"

  task_service:
    build:
      context: .
      dockerfile: docker/task_service.Dockerfile
    container_name: task_service_container
    ports:
      - "8001:8001"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: frontend_container
    ports:
      - "3000:80"
    depends_on:
      - user_service
      - task_service