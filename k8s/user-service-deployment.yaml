apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service-deployment
  namespace: task-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service-container
          image: arun95tech/user-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000

---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: task-management
spec:
  type: NodePort
  selector:
    app: user-service
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080