apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-service-deployment
  namespace: task-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-service
  template:
    metadata:
      labels:
        app: task-service
    spec:
      containers:
        - name: task-service-container
          image: arun95tech/task-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001

---
apiVersion: v1
kind: Service
metadata:
  name: task-service
  namespace: task-management
spec:
  type: NodePort
  selector:
    app: task-service
  ports:
    - port: 8001
      targetPort: 8001
      nodePort: 30081